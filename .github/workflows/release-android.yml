name: Release Android

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  android:
    name: AAB + Play Console upload (internal track)
    runs-on: ubuntu-latest
    env:
      # Required secrets (settle these before first tag push):
      #   ANDROID_KEYSTORE_B64         — `base64 -w0 release.keystore`
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_ALIAS
      #   ANDROID_KEY_PASSWORD
      #   PLAY_STORE_SERVICE_ACCOUNT   — JSON from GCP service account with
      #                                   "Google Play Android Developer" role
      #   SUPABASE_URL, SUPABASE_ANON_KEY
      #   FIREBASE_API_KEY, FIREBASE_APP_ID,
      #   FIREBASE_MESSAGING_SENDER_ID, FIREBASE_PROJECT_ID
      #   GMAPS_ANDROID_KEY
      KEYSTORE_PATH: android/app/release.keystore
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > $KEYSTORE_PATH

      - name: Write key.properties
        if: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release AAB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GMAPS_ANDROID_KEY: ${{ secrets.GMAPS_ANDROID_KEY }}
          # Native AndroidManifest picks up GMAPS_ANDROID_KEY via
          # project.findProperty() in android/app/build.gradle.kts. The
          # ORG_GRADLE_PROJECT_ prefix is how gradle turns env vars into
          # project properties.
          ORG_GRADLE_PROJECT_GMAPS_ANDROID_KEY: ${{ secrets.GMAPS_ANDROID_KEY }}
        run: |
          ARGS=""
          for var in SUPABASE_URL SUPABASE_ANON_KEY \
                     FIREBASE_API_KEY FIREBASE_APP_ID \
                     FIREBASE_MESSAGING_SENDER_ID FIREBASE_PROJECT_ID \
                     GMAPS_ANDROID_KEY; do
            val="${!var}"
            if [ -n "$val" ]; then
              ARGS="$ARGS --dart-define=$var=$val"
            fi
          done
          flutter build appbundle --release $ARGS

      - uses: actions/upload-artifact@v4
        with:
          name: kaiqiu-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # Upload to Play Console only when a service account is configured.
      - name: Upload to Play Console (internal track)
        if: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.kaiqiu.gameon
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
