name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  android:
    name: Android APK (debug-signed, unsigned for store)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter info
        run: flutter --version

      - run: flutter pub get

      - name: Build release APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          ARGS=""
          if [ -n "$SUPABASE_URL" ]; then
            ARGS="$ARGS --dart-define=SUPABASE_URL=$SUPABASE_URL"
          fi
          if [ -n "$SUPABASE_ANON_KEY" ]; then
            ARGS="$ARGS --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
          fi
          flutter build apk --release $ARGS

      - uses: actions/upload-artifact@v4
        with:
          name: kaiqiu-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: iOS (unsigned — needs Xcode re-sign to install)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter info
        run: flutter --version

      - run: flutter pub get

      - name: CocoaPods install
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned iOS app
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          ARGS=""
          if [ -n "$SUPABASE_URL" ]; then
            ARGS="$ARGS --dart-define=SUPABASE_URL=$SUPABASE_URL"
          fi
          if [ -n "$SUPABASE_ANON_KEY" ]; then
            ARGS="$ARGS --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
          fi
          flutter build ios --release --no-codesign $ARGS

      - name: Package unsigned IPA (for Sideloadly / AltStore re-sign)
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr kaiqiu-ios-unsigned.ipa Payload
          ls -lh kaiqiu-ios-unsigned.ipa

      - name: Zip raw Runner.app (for manual Xcode re-sign)
        run: |
          cd build/ios/iphoneos
          zip -qr Runner.app.zip Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: kaiqiu-ios-unsigned-ipa
          path: |
            build/ios/iphoneos/kaiqiu-ios-unsigned.ipa
            build/ios/iphoneos/Runner.app.zip
          if-no-files-found: error
