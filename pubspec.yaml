name: kaiqiu_app
description: "开球 · GameOn — 业余球类运动社交 App"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Routing
  go_router: ^14.6.0

  # State management
  flutter_riverpod: ^2.6.1

  # Supabase (auth, DB, realtime, storage)
  supabase_flutter: ^2.8.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  share_plus: ^10.1.2
  url_launcher: ^6.3.1

  # Images (S1)
  flutter_colorpicker: ^1.1.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1

  # Swipeable list actions (messages screen).
  flutter_slidable: ^3.1.2

  # Push notifications (S4). Only initialises when Env.isFirebaseConfigured.
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # Maps (S2). google_maps_flutter has first-class iOS/Android/web
  # support; the widget renders a gray tile without a key but the app
  # still builds, so CI stays green before you plug in GMAPS_API_KEY.
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Live stream video player — HLS via AVPlayer (iOS) / ExoPlayer (Android).
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
